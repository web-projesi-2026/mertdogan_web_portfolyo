<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEPORTAL - Platform Seçimi</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script>if(localStorage.getItem('oturum')==='acik') document.documentElement.classList.add('oturum-bekleniyor');</script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <a href="../index.html" class="logo-wrapper">
        <img src="../img/logolar/logo.png" alt="GAMEPORTAL Logo" class="header-logo">
    </a>
    <nav>
        <ul>
            <li><a href="../index.html">ANA SAYFA</a></li>
            <li class="dropdown mega-menu">
                <a href="#" class="dropbtn" style="color: #b76bff;">PLATFORMLAR<span class="nav-arrow"></span></a>
                </li>
            <li><a href="espor.html">E-SPOR</a></li>
        </ul>
    </nav>
   <div class="header-right">
        <div class="header-auth-group">
            <button class="auth-btn btn-login" onclick="openAuthModal('login')">GİRİŞ YAP</button>
            <span class="auth-sep">/</span>
            <button class="auth-btn btn-register" onclick="openAuthModal('register')">KAYIT OL</button>
        </div>
        
        <a href="canli-skor.html" class="live-score-btn"><span class="red-dot">•</span> CANLI SKOR</a>
        
        <div class="hamburger-menu">
            <div class="hamburger-icon"><span></span><span></span><span></span></div>
            <div class="hamburger-content">
                <a href="../index.html">ANA SAYFA</a>
                <a href="hmkategoriler.html">KATEGORİLER</a>
                <a href="espor.html">E-SPOR</a>
            </div>
        </div>
    </div>
</header>

    <main style="min-height: 80vh; padding: 40px 20px;">
    
    <div class="vertical-split-layout">
        
        <div class="split-side">
            <div class="title-card-wrapper" style="margin-bottom: 30px !important;">
                <h2 class="title-card-text">PLATFORMLAR</h2>
            </div>
            
            <div class="mobile-platforms-grid grid-2-col">
                <a href="platform.html?p=Xbox" class="mobile-plat-card">
                    <img src="../img/logolar/xbox.png" alt="Xbox" class="mobile-plat-logo"><span>XBOX</span>
                </a>
                <a href="platform.html?p=PS" class="mobile-plat-card">
                    <img src="../img/logolar/ps.png" alt="PlayStation" class="mobile-plat-logo"><span>PLAYSTATION</span>
                </a>
                <a href="platform.html?p=Nintendo" class="mobile-plat-card">
                    <img src="../img/logolar/nintendo.png" alt="Nintendo" class="mobile-plat-logo"><span>NINTENDO</span>
                </a>
                <a href="platform.html?p=Steam" class="mobile-plat-card">
                    <img src="../img/logolar/steam.png" alt="Steam" class="mobile-plat-logo"><span>STEAM</span>
                </a>
                <a href="platform.html?p=Epic Games" class="mobile-plat-card">
                    <img src="../img/logolar/epic.png" alt="Epic Games" class="mobile-plat-logo"><span>EPİC GAMES</span>
                </a>
                <a href="platform.html?p=EA Games" class="mobile-plat-card">
                    <img src="../img/logolar/ea.png" alt="EA Games" class="mobile-plat-logo"><span>EA GAMES</span>
                </a>
                <a href="platform.html?p=Ubisoft" class="mobile-plat-card">
                    <img src="../img/logolar/ubisoft.png" alt="Ubisoft" class="mobile-plat-logo"><span>UBİSOFT</span>
                </a>
            </div>
        </div>

        <div class="vertical-divider"></div>

        <div class="split-side">
            <div class="title-card-wrapper" style="margin-bottom: 30px !important;">
                <h2 class="title-card-text">ÜRETİCİLER</h2>
            </div>
            
            <div class="mobile-platforms-grid grid-2-col">
                <a href="platform.html?p=Nvidia" class="mobile-plat-card">
                    <img src="../img/logolar/nvidia.png" alt="Nvidia" class="mobile-plat-logo"><span>NVİDİA</span>
                </a>
                <a href="platform.html?p=AMD" class="mobile-plat-card">
                    <img src="../img/logolar/amd.png" alt="AMD" class="mobile-plat-logo"><span>AMD</span>
                </a>
                <a href="platform.html?p=Intel" class="mobile-plat-card">
                    <img src="../img/logolar/intel.png" alt="Intel" class="mobile-plat-logo"><span>INTEL</span>
                </a>
            </div>
        </div>

    </div>
    
</main>

    
    <div id="authModal" class="auth-modal-overlay">
    <div class="auth-modal-content">
        <span class="auth-close-btn" onclick="closeAuthModal()">&times;</span>
        <div class="auth-tabs">
            <button id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">GİRİŞ YAP</button>
            <button id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">KAYIT OL</button>
        </div>
        <div id="auth-message-box" style="margin: 15px; padding: 10px; border-radius: 6px; display: none; font-size: 13px;"></div>
        
        <div id="form-login" class="auth-form-section active">
            <h3>Hoş Geldiniz</h3>
            <form id="ajaxLoginForm">
                <input type="text" name="kullanici_adi" class="auth-input" placeholder="Kullanıcı Adı" required>
                <input type="password" name="sifre" class="auth-input" placeholder="Şifre" required>
                <button type="submit" class="auth-submit-btn">GİRİŞ YAP</button>
            </form>
        </div>

        <div id="form-register" class="auth-form-section">
            <h3>Yeni Hesap Oluştur</h3>
            <form id="ajaxRegisterForm">
                <input type="text" name="kullanici_adi" class="auth-input" placeholder="Kullanıcı Adı Seç" required>
                <input type="password" name="sifre" class="auth-input" placeholder="Şifre Oluştur" required>
                <button type="submit" class="auth-submit-btn">KAYIT OL</button>
            </form>
        </div>
    </div>
</div>
<script src="../assets/script.js"></script>
</body>
</html>
